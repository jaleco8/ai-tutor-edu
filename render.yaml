services:
  - type: web
    name: ai-tutor-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    branch: master
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        sync: false
