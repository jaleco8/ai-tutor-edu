name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "supabase/**"
      - "render.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: production-backend-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.67.1

      - name: Validate required secrets
        run: |
          : "${SUPABASE_ACCESS_TOKEN:?GitHub secret SUPABASE_ACCESS_TOKEN is required}"
          : "${RENDER_DEPLOY_HOOK_URL:?GitHub secret RENDER_DEPLOY_HOOK_URL is required}"

          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            : "${SUPABASE_PROJECT_REF:?GitHub secret SUPABASE_PROJECT_REF is required when SUPABASE_DB_URL is not set}"
            : "${SUPABASE_DB_PASSWORD:?GitHub secret SUPABASE_DB_PASSWORD is required when SUPABASE_DB_URL is not set}"
          fi

      - name: Build DB URL
        run: |
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            echo "DB_URL=${SUPABASE_DB_URL}" >> "$GITHUB_ENV"
          else
            # Session-mode pooler (port 5432, IPv4, supports DDL migrations)
            # Username must be postgres.PROJECT_REF for SASL auth via pooler
            echo "DB_URL=postgresql://postgres.${SUPABASE_PROJECT_REF}:${SUPABASE_DB_PASSWORD}@aws-1-eu-west-1.pooler.supabase.com:5432/postgres" >> "$GITHUB_ENV"
          fi

      - name: Preview pending migrations
        run: supabase db push --db-url "$DB_URL" --dry-run

      - name: Apply migrations
        run: supabase db push --db-url "$DB_URL"

      - name: Trigger Render deploy for this commit
        run: curl --fail-with-body --silent --show-error --request POST "${RENDER_DEPLOY_HOOK_URL}?ref=${GITHUB_SHA}"
